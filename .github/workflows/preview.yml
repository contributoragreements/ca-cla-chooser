name: Preview CI
on:
  issue_comment:
    types: [created]
  push:
    branches-ignore:
      - main
  pull_request:
    types:
      - opened
      - edited
      - synchronize
jobs:
  preview:
    name: Preview chooser
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && (contains(github.event.comment.body, 'Deploy') || contains(github.event.comment.body, 'deploy') || github.event_name == 'push' || github.event_name == 'pull_request')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.14.0
      - name: Install dependencies
        run: npm ci
      - name: Generate config files
        run: |
          git rev-parse --short HEAD > version.log
          echo '{"serviceUrl":"https://contributoragreements.org","urlShortener":"https://contributoragreements.org/u2s"}' > js/config.json
      - name: Install surge globally
        run: npm install -g surge
      - name: Deploy
        uses: koj-co/deploy-pr-action@v1.0.1
        with:
          prefix: fla-cla # Prefix for deployment URL
          distDir: . # Path to dist directory
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub token
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }} # Surge.sh email
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }} # Surge.sh token
