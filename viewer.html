<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agreement Chooser Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #1a1a1a; }

#app { display: flex; flex-direction: column; height: 100%; }

header {
  background: #1e1e2e; color: #cdd6f4;
  padding: 0 16px; height: 44px;
  display: flex; align-items: center; gap: 16px;
  flex-shrink: 0;
}
header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.01em; }
#header-hint { font-size: 12px; color: #6c7086; }
#header-generated { margin-left: auto; font-size: 12px; color: #6c7086; }

#layout { flex: 1; display: flex; overflow: hidden; }

/* ---- Sidebar ---- */
#sidebar {
  width: 300px; flex-shrink: 0;
  border-right: 1px solid #e0e0e0;
  display: flex; flex-direction: column;
  background: #f8f8f8;
}
#sidebar-top { padding: 8px; border-bottom: 1px solid #e0e0e0; }
#filter-input {
  width: 100%; padding: 5px 8px;
  border: 1px solid #ccc; border-radius: 4px;
  font-size: 13px; background: white;
}
#sidebar-list { flex: 1; overflow-y: auto; }

.path-group { border-bottom: 1px solid #eee; }
.path-label {
  padding: 7px 10px; font-size: 11px; font-weight: 700;
  color: #555; text-transform: uppercase; letter-spacing: 0.04em;
  background: #efefef;
}
.doc-item {
  padding: 6px 10px 6px 22px;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: background 0.08s; user-select: none;
}
.doc-item:hover { background: #e4e4e4; }
.doc-item.sel-a { background: #d0e8ff; }
.doc-item.sel-b { background: #fde8c8; }

.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-dot.pass { background: #2da44e; }
.status-dot.fail { background: #cf222e; }
.status-dot.unknown { background: #bbb; }

.doc-name { flex: 1; font-size: 13px; }
.sel-badge {
  font-size: 10px; font-weight: 700;
  padding: 1px 5px; border-radius: 3px;
}
.sel-badge.a { background: #0969da; color: white; }
.sel-badge.b { background: #bc4c00; color: white; }

/* ---- Content ---- */
#content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
#content-inner { flex: 1; overflow-y: auto; padding: 20px; }

.empty-state { color: #888; text-align: center; padding: 80px 20px; }
.empty-state strong { font-size: 16px; color: #555; }
.empty-state p { margin-top: 8px; font-size: 13px; line-height: 1.6; }
.empty-state code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; }

/* ---- Single doc view ---- */
.link-bar {
  background: #f0f6ff; border: 1px solid #cfe0f5;
  border-radius: 6px; padding: 10px 14px; margin-bottom: 16px;
  display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
}
.link-bar .link-label { font-size: 12px; color: #555; flex-shrink: 0; }
.link-bar a { font-size: 11px; font-family: monospace; color: #0969da; word-break: break-all; }
.link-bar .no-link { font-size: 12px; color: #c00; }

.doc-status-bar { font-size: 12px; margin-bottom: 14px; }
.doc-status-bar .badge {
  display: inline-block; padding: 2px 8px; border-radius: 12px;
  font-weight: 700; font-size: 11px;
}
.badge.pass { background: #dafbe1; color: #116329; }
.badge.fail { background: #ffebe9; color: #82071e; }

.doc-frame { border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
.doc-frame iframe { display: block; width: 100%; border: none; min-height: 400px; }

/* ---- Diff view ---- */
.diff-header { display: flex; gap: 12px; margin-bottom: 12px; }
.diff-doc-label {
  flex: 1; padding: 8px 12px; border-radius: 6px; font-size: 12px; line-height: 1.4;
}
.diff-doc-label.a { background: #ffebe9; border-left: 4px solid #cf222e; }
.diff-doc-label.b { background: #dafbe1; border-left: 4px solid #2da44e; }
.diff-doc-label strong { display: block; font-weight: 700; margin-bottom: 2px; }

.diff-summary { font-size: 12px; color: #666; margin-bottom: 14px; }
.diff-identical { color: #2da44e; font-weight: 700; }

.diff-body {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 13.5px; line-height: 1.75;
  border: 1px solid #e0e0e0; border-radius: 6px;
  padding: 16px 20px;
}
.diff-line { padding: 1px 4px; border-radius: 2px; }
.diff-line.equal { color: #333; }
.diff-line.removed { background: #ffebe9; color: #82071e; text-decoration: line-through; }
.diff-line.added { background: #dafbe1; color: #116329; }

.error-box {
  background: #fff0f0; border: 1px solid #fcc; border-radius: 6px;
  padding: 16px 20px; color: #800;
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Agreement Chooser Viewer</h1>
    <span id="header-hint">Click to view &middot; Click two to diff</span>
    <span id="header-generated"></span>
  </header>
  <div id="layout">
    <aside id="sidebar">
      <div id="sidebar-top">
        <input type="text" id="filter-input" placeholder="Filter agreements...">
      </div>
      <div id="sidebar-list"></div>
    </aside>
    <main id="content">
      <div id="content-inner">
        <div class="empty-state">
          <strong>No document selected</strong>
          <p>Run <code>npm run harness</code> to generate data,<br>
          then open this page via <code>http://localhost:4000/viewer.html</code><br><br>
          Select one agreement to view it, or two to compare them.</p>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
'use strict'

let data = null
let selected = []   // up to 2 doc objects

// ---- Init -------------------------------------------------------------------

async function init() {
    try {
        const res = await fetch('harness-texts.json')
        if (!res.ok) throw new Error(`HTTP ${res.status} — run npm run harness first`)
        data = await res.json()
        document.getElementById('header-generated').textContent =
            'Generated: ' + new Date(data.generated).toLocaleString()
        buildSidebar(data.documents)
    } catch (e) {
        document.getElementById('content-inner').innerHTML =
            `<div class="error-box"><strong>Could not load harness-texts.json</strong><br><br>
             Run <code>npm run harness</code> first, then open this page via the local server:<br>
             <code>http://localhost:4000/viewer.html</code><br><br>
             Error: ${esc(e.message)}</div>`
    }
}

// ---- Sidebar ----------------------------------------------------------------

function buildSidebar(docs) {
    // Group docs by wizard-path label (individual and entity share the same label)
    const groups = new Map()
    for (const doc of docs) {
        if (!groups.has(doc.label)) groups.set(doc.label, [])
        groups.get(doc.label).push(doc)
    }

    // Sort: FLA first, then CLA alphabetically
    const keys = [...groups.keys()].sort((a, b) => {
        const aFla = a.startsWith('FLA'), bFla = b.startsWith('FLA')
        if (aFla !== bFla) return aFla ? -1 : 1
        return a.localeCompare(b)
    })

    const list = document.getElementById('sidebar-list')
    list.innerHTML = ''

    for (const key of keys) {
        const grp = document.createElement('div')
        grp.className = 'path-group'
        grp.dataset.group = key.toLowerCase()

        const lbl = document.createElement('div')
        lbl.className = 'path-label'
        lbl.textContent = key
        grp.appendChild(lbl)

        for (const doc of groups.get(key)) {
            const item = document.createElement('div')
            item.className = 'doc-item'
            item.dataset.id = docId(doc)
            item.onclick = () => toggleSelect(doc)

            const dot = document.createElement('span')
            dot.className = 'status-dot ' +
                (doc.status === 'PASS' ? 'pass' : doc.status === 'FAIL' ? 'fail' : 'unknown')
            item.appendChild(dot)

            const name = document.createElement('span')
            name.className = 'doc-name'
            name.textContent = cap(doc.variant)
            item.appendChild(name)

            grp.appendChild(item)
        }

        list.appendChild(grp)
    }

    document.getElementById('filter-input').addEventListener('input', e => {
        const q = e.target.value.toLowerCase()
        for (const grp of list.querySelectorAll('.path-group')) {
            grp.style.display = grp.dataset.group.includes(q) ? '' : 'none'
        }
    })
}

// ---- Selection --------------------------------------------------------------

function docId(doc) { return doc.label + '/' + doc.variant }

function toggleSelect(doc) {
    const idx = selected.findIndex(d => docId(d) === docId(doc))
    if (idx !== -1) {
        selected.splice(idx, 1)
    } else {
        if (selected.length >= 2) selected.shift()
        selected.push(doc)
    }
    refreshSidebarHighlight()
    renderContent()
}

function refreshSidebarHighlight() {
    document.querySelectorAll('.doc-item').forEach(el => {
        el.classList.remove('sel-a', 'sel-b')
        const badge = el.querySelector('.sel-badge')
        if (badge) badge.remove()
    })
    selected.forEach((doc, i) => {
        const el = document.querySelector(`.doc-item[data-id="${CSS.escape(docId(doc))}"]`)
        if (!el) return
        el.classList.add(i === 0 ? 'sel-a' : 'sel-b')
        const badge = document.createElement('span')
        badge.className = 'sel-badge ' + (i === 0 ? 'a' : 'b')
        badge.textContent = i === 0 ? 'A' : 'B'
        el.appendChild(badge)
    })
}

// ---- Render -----------------------------------------------------------------

function renderContent() {
    const pane = document.getElementById('content-inner')
    pane.innerHTML = ''
    if (selected.length === 0) {
        pane.innerHTML = `<div class="empty-state">
            <strong>No document selected</strong>
            <p>Select one agreement to view it, or two to compare them.</p></div>`
    } else if (selected.length === 1) {
        renderDoc(selected[0], pane)
    } else {
        renderDiff(selected[0], selected[1], pane)
    }
}

function renderDoc(doc, pane) {
    // Link bar
    const linkBar = document.createElement('div')
    linkBar.className = 'link-bar'
    if (doc.recreateUrl) {
        linkBar.innerHTML = `<span class="link-label">Recreate on server:</span>
            <a href="${esc(doc.recreateUrl)}" target="_blank" rel="noopener">${esc(doc.recreateUrl)}</a>`
    } else {
        linkBar.innerHTML = `<span class="link-label">Recreate on server:</span>
            <span class="no-link">Link not found in document</span>`
    }
    pane.appendChild(linkBar)

    // Status badge
    const statusBar = document.createElement('div')
    statusBar.className = 'doc-status-bar'
    statusBar.innerHTML = `<span class="badge ${doc.status === 'PASS' ? 'pass' : 'fail'}">${esc(doc.status)}</span>
        &nbsp; ${esc(doc.label)} &mdash; ${esc(cap(doc.variant))}`
    pane.appendChild(statusBar)

    // Agreement rendered in sandboxed iframe
    const frameWrap = document.createElement('div')
    frameWrap.className = 'doc-frame'
    const iframe = document.createElement('iframe')
    iframe.sandbox = 'allow-same-origin'
    iframe.srcdoc = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
body{font-family:Georgia,'Times New Roman',serif;line-height:1.75;padding:28px 36px;max-width:860px;margin:0 auto;color:#1a1a1a}
h1,h2,h3,h4{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
h1{font-size:1.5em;margin-bottom:.25em}
h2{font-size:1.2em;margin-top:1.4em}
h3{font-size:1em;margin-top:1.2em;font-weight:600}
p{margin:.7em 0}
table{border-collapse:collapse;width:100%;margin:1em 0;font-size:.9em}
td,th{border:1px solid #ccc;padding:6px 10px;vertical-align:top}
section.recreate{margin-top:2em;padding-top:1em;border-top:1px solid #ddd;font-size:.85em;color:#555}
a{color:#0969da}
</style></head><body>${doc.html}</body></html>`
    iframe.onload = function () {
        try {
            const h = iframe.contentDocument.body.scrollHeight
            if (h > 200) iframe.style.height = (h + 40) + 'px'
        } catch (_) {}
    }
    iframe.style.height = '600px'
    frameWrap.appendChild(iframe)
    pane.appendChild(frameWrap)
}

function renderDiff(docA, docB, pane) {
    // Header showing which two docs are compared
    const header = document.createElement('div')
    header.className = 'diff-header'
    header.innerHTML = `
        <div class="diff-doc-label a">
            <strong>A &mdash; ${esc(docA.label)}</strong>${esc(cap(docA.variant))}
            ${docA.recreateUrl ? `<br><a href="${esc(docA.recreateUrl)}" target="_blank" style="font-size:11px;font-family:monospace">recreate &rarr;</a>` : ''}
        </div>
        <div class="diff-doc-label b">
            <strong>B &mdash; ${esc(docB.label)}</strong>${esc(cap(docB.variant))}
            ${docB.recreateUrl ? `<br><a href="${esc(docB.recreateUrl)}" target="_blank" style="font-size:11px;font-family:monospace">recreate &rarr;</a>` : ''}
        </div>`
    pane.appendChild(header)

    const linesA = htmlToLines(docA.html)
    const linesB = htmlToLines(docB.html)
    const chunks = lcsDiff(linesA, linesB)

    const nAdded   = chunks.filter(c => c.type === 'added').length
    const nRemoved = chunks.filter(c => c.type === 'removed').length

    const summary = document.createElement('div')
    summary.className = 'diff-summary'
    if (nAdded === 0 && nRemoved === 0) {
        summary.innerHTML = '<span class="diff-identical">Documents are identical in text content.</span>'
    } else {
        summary.textContent = `${nAdded} line(s) added, ${nRemoved} line(s) removed.`
    }
    pane.appendChild(summary)

    const body = document.createElement('div')
    body.className = 'diff-body'
    for (const chunk of chunks) {
        const line = document.createElement('div')
        line.className = 'diff-line ' + chunk.type
        line.textContent = (chunk.type === 'removed' ? '− ' : chunk.type === 'added' ? '+ ' : '  ') + chunk.value
        body.appendChild(line)
    }
    pane.appendChild(body)
}

// ---- Diff algorithm (LCS-based line diff) -----------------------------------

function htmlToLines(html) {
    const div = document.createElement('div')
    div.innerHTML = html
    return (div.innerText || div.textContent || '')
        .split('\n')
        .map(l => l.trim())
        .filter(l => l.length > 0)
}

function lcsDiff(a, b) {
    const m = a.length, n = b.length
    // Guard against very large inputs
    if (m > 800 || n > 800) {
        return [
            { type: 'equal',   value: `(A: ${m} lines, B: ${n} lines — too large to diff inline)` },
            ...a.slice(0, 5).map(v => ({ type: 'removed', value: v })),
            ...b.slice(0, 5).map(v => ({ type: 'added',   value: v })),
        ]
    }

    // Build LCS table
    const dp = Array.from({ length: m + 1 }, () => new Int32Array(n + 1))
    for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
            dp[i][j] = a[i-1] === b[j-1]
                ? dp[i-1][j-1] + 1
                : Math.max(dp[i-1][j], dp[i][j-1])
        }
    }

    // Backtrack
    const result = []
    let i = m, j = n
    while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
            result.unshift({ type: 'equal',   value: a[i-1] }); i--; j--
        } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
            result.unshift({ type: 'added',   value: b[j-1] }); j--
        } else {
            result.unshift({ type: 'removed', value: a[i-1] }); i--
        }
    }
    return result
}

// ---- Utilities --------------------------------------------------------------

function esc(s) {
    if (!s) return ''
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
}

function cap(s) {
    return s ? s.charAt(0).toUpperCase() + s.slice(1) : s
}

init()
</script>
</body>
</html>
